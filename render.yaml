# Render Deployment Config — CryptoPulse AI
# https://render.com/docs/infrastructure-as-code

services:
  # Backend API — Docker mit Python 3.11
  - type: web
    name: cryptopulse-api
    env: docker
    dockerfilePath: ./Dockerfile
    region: frankfurt
    plan: free
    branch: main
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cryptopulse-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://nusretlucke.github.io,https://nusretlucke.github.io/cryptopulse-ai,https://cryptopulse-ai-seven.vercel.app,http://localhost:5173
      - key: DEBUG
        value: false

databases:
  # PostgreSQL Datenbank
  - name: cryptopulse-db
    region: frankfurt
    plan: free
    databaseName: cryptopulse
    ipAllowList: [] # nur interne Render-Dienste